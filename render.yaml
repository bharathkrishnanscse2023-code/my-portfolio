# Render Blueprint — single web service that runs the Express API AND
# serves the built React client from the same origin (mirrors localhost).
# Deploy: push to GitHub, then on render.com → New → Blueprint → pick this repo.
services:
  - type: web
    name: bk-portfolio
    runtime: node
    plan: free
    # install client + server deps, then build the React app into client/dist
    buildCommand: npm run install:all && npm run build
    # start the Express server (serves /api and the static client build)
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_ORIGIN
        sync: false   # set to your Render URL, e.g. https://bk-portfolio.onrender.com
      - key: OWNER_EMAIL
        value: bharathkrishnans.cse2023@citchennai.net
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false   # your gmail address
      - key: SMTP_PASS
        sync: false   # gmail App Password (not your login password)
