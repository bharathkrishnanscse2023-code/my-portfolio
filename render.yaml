# Render Blueprint — API-only backend for the portfolio.
# The React frontend is hosted separately on Vercel; this service runs the
# Express API (/api/contact, /api/feedback, /api/analytics, /api/stats).
# Deploy: push to GitHub, then on render.com → New → Blueprint → pick this repo.
services:
  - type: web
    name: bk-portfolio-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # CORS: set this to your Vercel frontend URL, e.g. https://bk-portfolio.vercel.app
      - key: CLIENT_ORIGIN
        sync: false
      - key: OWNER_EMAIL
        value: bharathkrishnans.cse2023@citchennai.net
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false   # your gmail address
      - key: SMTP_PASS
        sync: false   # gmail App Password (not your login password)
